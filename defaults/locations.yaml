--- !define


HOME_DIR: $(__USER_HOME_DIR__)
WAVES_APPS_DIR: $(WAVES_DIR)/Applications V10
WAVES_SHELLS_DIR: $(WAVES_DIR)/WaveShells V10
WAVES_MULTIRACK_DIR: $(WAVES_DIR)/MultiRack
WAVES_MULTIRACK_FOR_KRAMER_DIR: $(WAVES_DIR)/MultiRack for Kramer
WAVES_SOUNDGRID_DIR: $(WAVES_DIR)/SoundGrid
WAVES_SOUNDGRID_UTILITIES_DIR: $(WAVES_SOUNDGRID_DIR)/Utilities
WAVES_SOUNDGRID_DOCUMENTS_DIR: $(WAVES_SOUNDGRID_DIR)/Documents
WAVES_SOUNDGRID_STUDIO_DIR: $(WAVES_DIR)/SoundGrid Studio
WAVES_EMOTION_LV1_DIR: $(WAVES_DIR)/eMotion LV1
WAVES_SOUNDGRID_FOR_VENUE_DIR: $(WAVES_DIR)/SoundGrid for Venue
WAVES_SUPERRACK_DIR: $(WAVES_DIR)/SuperRack
WAVES_MODULES_DIR: $(WAVES_PROGRAMDATA_DIR)/Modules
WAVES_SOUNDGRID_FIRMWARE_DIR: $(WAVES_PROGRAMDATA_DIR)/SoundGrid Firmware
WAVES_SOUNDGRID_IO_MODULES_DIR: $(WAVES_PROGRAMDATA_DIR)/SoundGrid IO Modules
WAVES_CENTRAL_INSTALL_DIR: $(WAVES_APPS_DIR)
WAVES_INSTRUMENT_DATA_DEFAULT_DIR: $(WAVES_DIR)/Data/Instrument Data
WAVES_INSTRUMENT_DATA_NKS_DIR: $(WAVES_INSTRUMENT_DATA_DEFAULT_DIR)/NKS
WAVES_INSTRUMENT_DATA_NKS_FX_DIR: $(WAVES_DIR)/Data/NKS FX
WAVES_INSTRUMENT_DATA_MISC_DIR: $(WAVES_INSTRUMENT_DATA_DEFAULT_DIR)/Misc
WAVES_INSTRUMENT_DATA_DIR: $(WAVES_INSTRUMENT_DATA_DEFAULT_DIR)
WAVES_PIVOT_DIR: $(WAVES_PROGRAMDATA_DIR)/Pivot
DIRECT_SYNC_INSTRUMENT_DATA: yes
WAVES_CENTRAL_LOGS_DIR: $(WAVES_CENTRAL_APP_DATA_DIR)/Logs


PATHS_TO_RESOLVE:
    - DOWNLOAD_TOOL_PATH
    - SET_ICON_TOOL_PATH

WAVES_DRIVERS_DIR: $(WAVES_SOUNDGRID_DIR)

--- !define_Mac

__environment__:
    - HOME

USER_WAVES_DIR: $(HOME)/Library/Application Support/Waves Audio
WAVES_DIR: "/Applications/Waves"
WAVES_PLUGINS_DIR: $(WAVES_DIR)/Plug-Ins V10
MACOS_APPLICATIONSUPPORT_DIR: "/Library/Application Support"
MACOS_WAVESHELL_AU_DIR: "/Library/Audio/Plug-Ins/Components"
WAVES_CENTRAL_APP_DATA_DIR: $(USER_WAVES_DIR)/Waves Central

MACOS_WAVESHELL_DAE_DIR: "/Library/Application Support/Digidesign/Plug-Ins"
MACOS_WAVESHELL_VST_DIR: "/Library/Audio/Plug-Ins/VST"
MACOS_WAVESHELL_VST3_DIR: "/Library/Audio/Plug-Ins/VST3"
WAVESHELL_AAX_DIR: "/Library/Application Support/Avid/Audio/Plug-Ins"
WAVES_WPAPI_DIR: "/Library/Audio/Plug-Ins/WPAPI"
WAVES_PROGRAMDATA_DIR: /Library/Application Support/Waves
SAMPLE_LIBRARIES_LOCATIONS_DIR: /Users/Shared/Waves/Sample Libraries Locations
WAVES_SG_TEMPLATES_DIR: /Users/Shared/Waves/eMotion
WAVES_PREFERENCES_DIR: $(HOME_DIR)/Library/Preferences/Waves Preferences
WAVES_SHARED_DIR: /Users/Shared/Waves
VENDOR_DIR_NAME: Waves/Central
WLE_EXEC_PATH: "/Library/Application Support/Waves/Modules/WavesLicenseEngine.bundle/Contents/MacOS/exec/wle"
WLE_EXEC_REL_PATH: "WavesLicenseEngine.bundle/Contents/MacOS/exec/wle"


WAVES_SHELL_DIRS:
    - $(MACOS_WAVESHELL_AU_DIR)
    - $(MACOS_WAVESHELL_DAE_DIR)
    - $(MACOS_WAVESHELL_VST_DIR)
    - $(MACOS_WAVESHELL_VST3_DIR)
    - $(WAVESHELL_AAX_DIR)
    - $(WAVES_WPAPI_DIR)

WAVES_SHELL_DIRS_BY_TYPE:
    - "AU::$(MACOS_WAVESHELL_AU_DIR)"
    - "DAE::$(MACOS_WAVESHELL_DAE_DIR)"
    - "VST::$(MACOS_WAVESHELL_VST_DIR)"
    - "VST3::$(MACOS_WAVESHELL_VST3_DIR)"
    - "AAX::$(WAVESHELL_AAX_DIR)"
    - "WPAPI::$(WAVES_WPAPI_DIR)"
    - "WPAPI_2::$(WAVES_WPAPI_DIR)"


--- !define_Win


--- !define_Win
__environment__:
   - HOMEPATH
   - ProgramW6432
   - CommonProgramW6432
   - PUBLIC
   - APPDATA
   - CommonProgramFiles(x86)
   - ProgramData
   - ProgramFiles(x86)

WAVES_DIR: $(ProgramFiles(x86))\Waves
WAVES_PLUGINS_DIR: $(WAVES_DIR)\Plug-Ins V10
WIN_WAVESHELL_DAE_X86_DIR: $(ProgramFiles(x86))\Common Files\Digidesign\DAE\Plug-ins
WIN_WAVESHELL_DAE_X64_DIR: $(ProgramW6432)\Common Files\Digidesign\DAE\Plug-ins
WIN_WAVESHELL_VST_X86_DIR: $(ProgramFiles(x86))\VSTPlugIns
WIN_WAVESHELL_VST_X64_DIR: $(ProgramW6432)\VSTPlugIns
WIN_WAVESHELL_VST3_X86_DIR: $(ProgramFiles(x86))\Common Files\VST3
WIN_WAVESHELL_VST3_X64_DIR: $(ProgramW6432)\Common Files\VST3
WAVESHELL_AAX_DIR: $(CommonProgramW6432)\Avid\Audio\Plug-Ins
WAVES_WPAPI_DIR: $(CommonProgramFiles(x86))\WPAPI
WAVES_PROGRAMDATA_DIR: $(ProgramData)\Waves Audio
WAVES_SHARED_DIR: $(PUBLIC)\Waves Audio
SAMPLE_LIBRARIES_LOCATIONS_DIR: $(WAVES_SHARED_DIR)\Sample Libraries Locations
WAVES_SG_TEMPLATES_DIR: $(WAVES_SHARED_DIR)\eMotion

VENDOR_DIR_NAME: Waves Audio/Central
WAVES_PREFERENCES_DIR: $(APPDATA)\Waves Audio\Preferences
WAVES_CENTRAL_APP_DATA_DIR:  $(APPDATA)\Waves Central
WLE_EXEC_PATH: $(ProgramData)/Waves Audio/Modules/WavesLicenseEngine.bundle/Contents/Win64/exec/wle.exe
WLE_EXEC_REL_PATH: WavesLicenseEngine.bundle/Contents/Win64/exec/wle.exe

WAVES_SHELL_DIRS:
   - $(WAVES_SHELLS_DIR)
   - $(WIN_WAVESHELL_DAE_X86_DIR)
   - $(WIN_WAVESHELL_DAE_X64_DIR)
   - $(WIN_WAVESHELL_VST_X86_DIR)
   - $(WIN_WAVESHELL_VST_X64_DIR)
   - $(WIN_WAVESHELL_VST3_X86_DIR)
   - $(WIN_WAVESHELL_VST3_X64_DIR)
   - $(WAVESHELL_AAX_DIR)
   - $(WAVES_WPAPI_DIR)


WAVES_SHELL_DIRS_BY_TYPE:
   - "CHECK::$(WAVES_SHELLS_DIR)"
   - "DAE::$(WIN_WAVESHELL_DAE_X86_DIR)"
   - "DAEx64::$(WIN_WAVESHELL_DAE_X64_DIR)"
   - "VST::$(WIN_WAVESHELL_VST_X86_DIR)"
   - "VSTx64::$(WIN_WAVESHELL_VST_X64_DIR)"
   - "VST3::$(WIN_WAVESHELL_VST3_X86_DIR)"
   - "VST3x64::$(WIN_WAVESHELL_VST3_X64_DIR)"
   - "AAX::$(WAVESHELL_AAX_DIR)"
   - "WPAPI::$(WAVES_WPAPI_DIR)"
   - "WPAPI_2::$(WAVES_WPAPI_DIR)"
